name: ether-chat-web

services:
  chat-web:
    build:
      context: ..
      dockerfile: container/Dockerfile
    image: ether-chat-web:local
    ports:
      - "8080:8080"
    environment:
      # Override these with real values via a .env file or environment variables.
      # Do NOT commit secrets here.
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-}
      - VITE_AUTH_ENDPOINT=${VITE_AUTH_ENDPOINT:-/api/auth/login}
      - VITE_CHAT_ENDPOINT=${VITE_CHAT_ENDPOINT:-/api/chat/message}
      - VITE_WIDGET_POSITION=${VITE_WIDGET_POSITION:-bottom-right}
      - VITE_WIDGET_MODE=${VITE_WIDGET_MODE:-floating}
      - VITE_TINKER_MODE=${VITE_TINKER_MODE:-hidden}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
